<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Aktif! — TeknoRehber</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif}@keyframes pop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}.pop{animation:pop .5s ease forwards}</style>
</head>
<body class="bg-gradient-to-br from-sky-50 to-indigo-100 min-h-screen flex items-center justify-center px-4">
  <div class="bg-white rounded-3xl shadow-2xl p-10 max-w-md w-full text-center">
    <div class="text-6xl mb-6 pop">⭐</div>
    <h1 class="text-3xl font-black text-gray-900 mb-3">Premium Aktif!</h1>
    <p class="text-gray-500 mb-8">Tebrikler! Artık tüm reklamlar kaldırıldı ve premium içeriklere erişebilirsin.</p>
    <div class="bg-green-50 border border-green-200 rounded-xl p-4 mb-8 text-sm text-green-700 text-left space-y-2">
      <div class="flex items-center gap-2"><span class="font-bold">✓</span> Reklamsız okuma aktif</div>
      <div class="flex items-center gap-2"><span class="font-bold">✓</span> Tüm premium makaleler açık</div>
      <div class="flex items-center gap-2"><span class="font-bold">✓</span> Haftalık özel bülten aktif</div>
    </div>
    <a href="index.html" class="block py-4 bg-gradient-to-r from-sky-500 to-indigo-600 text-white font-bold rounded-xl hover:opacity-90 transition-opacity">
      Siteye Dön →
    </a>
    <button onclick="deactivate()" class="mt-4 text-xs text-gray-300 hover:text-gray-500 transition-colors">Çıkış yap / Premium'u kaldır</button>
  </div>

  <script>
    // Premium'u aktif et
    localStorage.setItem('premium', 'true');
    localStorage.setItem('premium_date', new Date().toISOString());

    function deactivate() {
      if (confirm('Premium üyeliği bu cihazdan kaldırmak istediğine emin misin?')) {
        localStorage.removeItem('premium');
        localStorage.removeItem('premium_date');
        window.location.href = 'index.html';
      }
    }
  </script>
</body>
</html>
